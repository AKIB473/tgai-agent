name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src/ --ignore E501,F401

      - name: Black (check only)
        run: black --check src/ tests/ --line-length 100

      - name: MyPy
        run: mypy src/ --ignore-missing-imports

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Generate test encryption key
        id: gen_key
        run: |
          KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          echo "ENCRYPTION_KEY=$KEY" >> $GITHUB_ENV

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src/tgai_agent --cov-report=xml
        env:
          BOT_TOKEN: "1234567890:AABBCCDDEEFFaabbccddeeff-1234567890AB"
          API_ID: "12345678"
          API_HASH: "abcdef1234567890abcdef1234567890"
          ADMIN_IDS: "123456789"
          DB_PATH: "/tmp/test_tgai.db"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
