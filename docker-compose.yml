version: "3.9"

services:
  tgai-agent:
    build: .
    container_name: tgai-agent
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_PATH=/data/data.db
      - SESSION_PATH=/data/sessions/
    volumes:
      - tgai_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  tgai_data:
    driver: local
